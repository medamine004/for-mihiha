<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour ismahen 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* --- RESET ET STYLE GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6fa 0%, #ffc3d9 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden; /* Empêche le défilement */
        }

        /* --- DÉCORATION D'ARRIÈRE-PLAN --- */
        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            z-index: 0;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        /* --- CONTENEUR DE LA CARTE --- */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 135, 0.3);
            text-align: center;
            max-width: 90%;
            width: 400px;
            position: relative;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* --- TEXTE ET EMOJI --- */
        .emoji-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #d63384;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        p {
            color: #666;
            margin-top: 1rem;
            font-size: 1rem;
        }

        /* --- BOUTONS --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #d90429, #ef233c);
        }

        .btn-no {
            background: #f1f3f5;
            color: #495057;
        }

        /* --- VIDÉO (VERSION PETITE) --- */
        .video-wrapper {
            width: 100%;
            /* C'EST ICI QUE JE RÈGLE LA TAILLE : */
            max-width: 180px; 
            margin: 0 auto; /* Centrer */
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.2);
            opacity: 0;
            animation: fadeUp 1s forwards 0.3s;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- CLASSES UTILITAIRES --- */
        .hidden {
            display: none !important;
        }

        /* --- ANIMATIONS --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Canvas Confetti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        /* Mobile */
        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .card { width: 90%; padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-heart" style="top: 10%; left: 10%;">💖</div>
    <div class="bg-heart" style="top: 20%; right: 20%; animation-delay: 1s;">💕</div>
    <div class="bg-heart" style="bottom: 15%; left: 20%; animation-delay: 2s;">🥰</div>
    <div class="bg-heart" style="bottom: 10%; right: 10%; animation-delay: 3s;">🧸</div>

    <canvas id="confetti-canvas"></canvas>

    <div class="card" id="main-card">
        <span class="emoji-icon">🧸</span>
        <h1>ismahen, will you be my Valentine?</h1>
        <div class="btn-group">
            <button class="btn-yes" id="yesBtn">Yes 💖</button>
            <button class="btn-no" id="noBtn">No 😅</button>
        </div>
    </div>

    <div class="card hidden" id="success-card">
        <h1 style="margin-bottom: 1rem;">YAAAY!! 🥰💕</h1>
        
        <div class="video-wrapper">
            <video autoplay loop muted playsinline>
                <source src="video/lapa.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>
        
        <p>Can't wait! ❤️</p>
    </div>

    <script>
        /* --- JAVASCRIPT --- */
        
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainCard = document.getElementById('main-card');
        const successCard = document.getElementById('success-card');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        // 1. Bouton "Non" qui s'enfuit
        function moveButton() {
            // Calculer une position aléatoire
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed'; 
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // Événements souris et tactile
        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('click', (e) => {
             e.preventDefault(); 
             moveButton();
        });
        noBtn.addEventListener('touchstart', (e) => {
             e.preventDefault(); 
             moveButton();
        });

        // 2. Bouton "Oui"
        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none'; // Cacher la question
            successCard.classList.remove('hidden'); // Montrer le succès
            startConfetti(); // Lancer les confettis
        });

        // 3. Moteur de Confettis
        let particles = [];
        const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function startConfetti() {
            // Créer 100 particules
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
