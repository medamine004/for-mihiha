<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For ismahen 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL RESET & BODY --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6fa 0%, #ffc3d9 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden; /* Prevents scrollbars during animations */
        }

        /* --- BACKGROUND DECORATION --- */
        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            z-index: 0;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        /* --- CARD CONTAINER --- */
        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 105, 135, 0.2);
            text-align: center;
            max-width: 90%;
            width: 420px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, opacity 0.5s ease;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- TYPOGRAPHY --- */
        .emoji-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
            animation: bounce 2s infinite;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 2rem;
            line-height: 1.3;
        }

        p {
            color: #666;
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        /* --- BUTTONS --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            position: relative; /* Essential for No button absolute positioning context if needed */
            min-height: 60px; /* Reserve space */
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        .btn-no {
            background: #f1f3f5;
            color: #495057;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* --- SUCCESS SCREEN --- */
        .hidden {
            display: none !important;
        }

        /* The container for the video to ensure sizing */
        .video-wrapper {
            width: 100%;
            max-width: 280px; /* Keeps video small */
            margin: 0 auto;   /* Centers it */
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.15);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.8s forwards 0.3s; /* Smooth entry */
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* --- ANIMATIONS --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; width: 90%; }
            h1 { font-size: 1.8rem; }
            .btn-group { flex-direction: column; align-items: center; gap: 1rem; }
            button { width: 100%; max-width: 200px; }
        }
    </style>
</head>
<body>

    <div class="bg-heart" style="top: 10%; left: 10%;">💖</div>
    <div class="bg-heart" style="top: 20%; right: 20%; animation-delay: 1s;">💕</div>
    <div class="bg-heart" style="bottom: 15%; left: 20%; animation-delay: 2s;">🥰</div>

    <canvas id="confetti-canvas"></canvas>

    <div class="card" id="main-card">
        <span class="emoji-icon">🧸</span>
        <h1>Sara, will you be my Valentine?</h1>
        <div class="btn-group">
            <button class="btn-yes" id="yesBtn">Yes 💖</button>
            <button class="btn-no" id="noBtn">No 😅</button>
        </div>
    </div>

    <div class="card hidden" id="success-card">
        <h1 style="margin-bottom: 1rem;">YAAAY!! 🥰💕</h1>
        
        <div class="video-wrapper">
            <video autoplay loop muted playsinline>
                <source src="https://cdn.pixabay.com/video/2022/02/08/107050-675276326_tiny.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </div>
        
        <p>I knew you'd say yes! ❤️</p>
    </div>

    <script>
        /* --- LOGIC & INTERACTIVITY --- */
        
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainCard = document.getElementById('main-card');
        const successCard = document.getElementById('success-card');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        // 1. "No" Button Escaping Logic
        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed'; // Use fixed to break out of the flex container
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
             e.preventDefault(); // Prevent touch click on mobile
             moveButton();
        });

        // 2. "Yes" Button Logic
        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none'; // Remove old card
            successCard.classList.remove('hidden'); // Show new card
            startConfetti(); // Trigger joy
        });

        // 3. Confetti Engine
        let particles = [];
        const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function startConfetti() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
